<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Zulk | Bem-vindo</title>

    <!-- FONT -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background-animation"></div>

    <main class="container">

        <!-- BOAS VINDAS -->
        <div id="welcome-view" class="view active">

            <div class="brand">

                <div class="logo"></div>

                <h1>Zulk</h1>

            </div>

            <p class="subtitle">

                Bem-vindo ao Zulk.
                Escolha uma opção abaixo.

            </p>

            <div class="actions">

                <button
                    id="btn-show-register"
                    class="btn btn-primary">

                    Criar Conta

                </button>

                <button
                    id="btn-show-login"
                    class="btn btn-secondary">

                    Entrar

                </button>

            </div>

        </div>

        <!-- CADASTRO -->
        <div id="register-view" class="view hidden">

            <div class="view-header">

                <h2>Criar Conta</h2>

                <p>
                    Crie sua conta no Zulk.
                </p>

            </div>

            <form id="register-form" class="form">

                <!-- NOME -->
                <div class="form-group">

                    <label for="reg-nome">
                        Nome
                    </label>

                    <input
                        type="text"
                        id="reg-nome"
                        name="nome"
                        autocomplete="name"
                        placeholder="Seu nome"
                        required>

                </div>

                <!-- SOBRENOME -->
                <div class="form-group">

                    <label for="reg-sobrenome">
                        Sobrenome
                    </label>

                    <input
                        type="text"
                        id="reg-sobrenome"
                        name="sobrenome"
                        autocomplete="family-name"
                        placeholder="Seu sobrenome"
                        required>

                </div>

                <!-- EMAIL -->
                <div class="form-group">

                    <label for="reg-email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="reg-email"
                        name="email"
                        autocomplete="email"
                        placeholder="seu@email.com"
                        required>

                </div>

                <!-- TELEFONE -->
                <div class="form-group">

                    <label for="reg-telefone">
                        Telefone
                    </label>

                    <input
                        type="tel"
                        id="reg-telefone"
                        name="telefone"
                        autocomplete="tel"
                        placeholder="(11) 99999-9999"
                        required>

                </div>

                <!-- SENHA -->
                <div class="form-group">

                    <label for="reg-password">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="reg-password"
                        name="password"
                        autocomplete="new-password"
                        placeholder="********"
                        required>

                </div>

                <!-- BOTÕES -->
                <div class="form-actions">

                    <button
                        type="button"
                        class="btn btn-ghost btn-back">

                        Voltar

                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Finalizar Cadastro

                    </button>

                </div>

            </form>

        </div>

        <!-- LOGIN -->
        <div id="login-view" class="view hidden">

            <div class="view-header">

                <h2>Entrar</h2>

                <p>
                    Acesse sua conta.
                </p>

            </div>

            <form id="login-form" class="form">

                <!-- EMAIL -->
                <div class="form-group">

                    <label for="log-email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="log-email"
                        name="email"
                        autocomplete="email"
                        placeholder="seu@email.com"
                        required>

                </div>

                <!-- SENHA -->
                <div class="form-group">

                    <label for="log-password">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="log-password"
                        name="password"
                        autocomplete="current-password"
                        placeholder="********"
                        required>

                </div>

                <!-- BOTÕES -->
                <div class="form-actions">

                    <button
                        type="button"
                        class="btn btn-ghost btn-back">

                        Voltar

                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary">

                        Entrar

                    </button>

                </div>

            </form>

        </div>

    </main>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
